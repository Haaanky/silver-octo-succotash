<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="utf-8" />
    <title>LagerApp</title>
    <script>
        // SPA fallback for GitHub Pages
        // Redirects 404 back to index.html with the path encoded as a query param
        var l = window.location;
        l.replace(
            l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 2).join('/') +
            '/?p=' + encodeURIComponent(l.pathname.slice(1) + l.search) +
            l.hash
        );
    </script>
</head>
<body>
    <p>Omdirigerar…</p>
</body>
</html>
