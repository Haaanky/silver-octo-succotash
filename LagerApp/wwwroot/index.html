<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LagerApp</title>
    <base href="/" />
    <script>
        // Restore path encoded by 404.html SPA fallback for GitHub Pages
        (function () {
            var search = window.location.search;
            if (search.startsWith('?p=')) {
                var base = document.querySelector('base')?.getAttribute('href') ?? '/';
                var path = decodeURIComponent(search.slice(3));
                window.history.replaceState(null, null, base + path);
            }
        })();
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body>
    <div id="app">
        <div class="d-flex justify-content-center align-items-center" style="height:100vh">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Laddar…</span>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        Ett oväntat fel inträffade. <a href="" class="reload">Ladda om</a>
        <a class="dismiss">&#10006;</a>
    </div>

    <script src="js/export.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
