name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        if: github.event.action != 'closed'
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        if: github.event.action != 'closed'
        working-directory: web
        run: npm ci

      - name: Build for preview path
        if: github.event.action != 'closed'
        working-directory: web
        run: npx vite build --base /pr-preview/pr-${{ github.event.number }}/
        env:
          VITE_SUPABASE_URL: https://ihqqqynuqclycffgraxl.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlocXFxeW51cWNseWNmZmdyYXhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODY3MTgsImV4cCI6MjA5MDM2MjcxOH0.YKU2q4K8vC72O6Qd1Ym6fPuJPJSWB24Gjo_wrqPck8k

      - uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: web/dist
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          custom-url: silver-octo-succotash.frisemo.dev
