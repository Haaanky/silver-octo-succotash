name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        if: github.event.action != 'closed'
        with:
          dotnet-version: '9.x'

      - name: Publish Blazor WASM
        if: github.event.action != 'closed'
        run: dotnet publish LagerApp/LagerApp.csproj -c Release -o publish

      - name: Set base href for preview path
        if: github.event.action != 'closed'
        run: |
          sed -i 's|<base href="/" />|<base href="/pr-preview/pr-${{ github.event.number }}/" />|' publish/wwwroot/index.html

      - name: Add .nojekyll
        if: github.event.action != 'closed'
        run: touch publish/wwwroot/.nojekyll

      - uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: publish/wwwroot
          preview-branch: gh-pages
          umbrella-dir: pr-preview
