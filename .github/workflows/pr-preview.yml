name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        if: github.event.action != 'closed'
        with:
          dotnet-version: '9.x'

      - name: Publish Blazor WASM
        if: github.event.action != 'closed'
        run: dotnet publish LagerApp/LagerApp.csproj -c Release -o publish-blazor

      - uses: actions/setup-node@v4
        if: github.event.action != 'closed'
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install React app dependencies
        if: github.event.action != 'closed'
        working-directory: web
        run: npm ci

      - name: Build React app for preview path
        if: github.event.action != 'closed'
        working-directory: web
        # Override the base path so all assets load correctly under the preview URL
        run: npx vite build --base /pr-preview/pr-${{ github.event.number }}/

      - name: Assemble deploy directory
        if: github.event.action != 'closed'
        run: |
          mkdir -p publish/wwwroot
          # React at root of preview
          cp -r web/dist/. publish/wwwroot/
          # Blazor at /blazor/ within preview
          mkdir -p publish/wwwroot/blazor
          cp -r publish-blazor/wwwroot/. publish/wwwroot/blazor/
          # Update Blazor base href for preview path
          sed -i 's|<base href="/" />|<base href="/pr-preview/pr-${{ github.event.number }}/blazor/" />|' publish/wwwroot/blazor/index.html
          rm -f publish/wwwroot/blazor/CNAME

      - name: Add .nojekyll
        if: github.event.action != 'closed'
        run: touch publish/wwwroot/.nojekyll

      - uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: publish/wwwroot
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          custom-url: silver-octo-succotash.frisemo.dev
