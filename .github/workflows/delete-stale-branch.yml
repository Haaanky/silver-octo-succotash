name: Delete stale branch

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch name to delete'
        required: true
        default: 'copilot/fix-e2e-preview-tests-again'

permissions:
  contents: write

jobs:
  delete-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Delete branch
        uses: actions/github-script@v8
        with:
          script: |
            const branch = context.payload.inputs.branch;
            if (branch === 'main' || branch === 'gh-pages') {
              core.setFailed(`Refusing to delete protected branch: ${branch}`);
              return;
            }
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`
              });
              console.log(`Deleted branch: ${branch}`);
            } catch (err) {
              if (err.status === 422) {
                console.log(`Branch already deleted: ${branch}`);
              } else {
                throw err;
              }
            }
