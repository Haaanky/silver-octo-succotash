name: E2E Tests

on:
  workflow_run:
    workflows: [Deploy to GitHub Pages]
    types: [completed]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'URL att testa mot'
        default: 'https://silver-octo-succotash.frisemo.dev'

jobs:
  test:
    runs-on: ubuntu-latest
    environment: Supabase
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Vänta på att GitHub Pages-deploymentet ska bli live
        if: github.event_name == 'workflow_run'
        run: |
          URL="${{ 'https://silver-octo-succotash.frisemo.dev' }}"
          SHA="${{ github.event.workflow_run.head_sha }}"
          echo "Väntar på att $URL/version.txt ska innehålla commit $SHA..."
          for i in $(seq 1 60); do
            DEPLOYED=$(curl -s "$URL/version.txt" 2>/dev/null | tr -d '[:space:]')
            if [ "$DEPLOYED" = "$SHA" ]; then
              echo "Rätt version live: $DEPLOYED. Klart!"
              break
            fi
            echo "Försök $i/60: live=$DEPLOYED, want=$SHA – väntar 10s..."
            sleep 10
          done

      - name: Run E2E tests
        run: npm test
        env:
          BASE_URL: ${{ inputs.base_url || 'https://silver-octo-succotash.frisemo.dev' }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
