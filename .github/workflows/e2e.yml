name: E2E Tests

on:
  workflow_run:
    workflows: [Deploy to GitHub Pages]
    types: [completed]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'URL att testa mot'
        default: 'https://silver-octo-succotash.frisemo.dev'

jobs:
  test:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Vänta på att GitHub Pages-deploymentet ska bli live
        if: github.event_name == 'workflow_run'
        run: |
          URL="${{ 'https://silver-octo-succotash.frisemo.dev' }}"
          echo "Väntar på att $URL ska svara..."
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "Siten är live (HTTP 200). Väntar ytterligare 10s för att CDN ska propagera..."
              sleep 10
              break
            fi
            echo "Försök $i/18: HTTP $STATUS – väntar 10s..."
            sleep 10
          done

      - name: Run E2E tests
        run: npm test
        env:
          BASE_URL: ${{ inputs.base_url || 'https://silver-octo-succotash.frisemo.dev' }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
