name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Switch from "GitHub Actions" Pages source to branch-based deployment so
# that rossjrw/pr-preview-action (which also pushes to gh-pages) can coexist.
# NOTE: In repo Settings → Pages, set source to "Deploy from branch: gh-pages".
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Publish Blazor WASM
        run: dotnet publish LagerApp/LagerApp.csproj -c Release -o publish-blazor

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install React app dependencies
        working-directory: web
        run: npm ci

      - name: Build React app
        working-directory: web
        run: npm run build

      - name: Assemble deploy directory
        run: |
          mkdir -p deploy
          # React at root
          cp -r web/dist/. deploy/
          # Blazor at /blazor/
          mkdir -p deploy/blazor
          cp -r publish-blazor/wwwroot/. deploy/blazor/
          # Update Blazor base href to /blazor/
          sed -i 's|<base href="/" />|<base href="/blazor/" />|' deploy/blazor/index.html
          # CNAME must only be at root
          cp CNAME deploy/CNAME
          rm -f deploy/blazor/CNAME

      - name: Create 404.html for SPA routing
        run: |
          cat > deploy/404.html << 'EOF'
          <!DOCTYPE html>
          <html lang="sv">
          <head>
              <meta charset="utf-8" />
              <title>LagerApp</title>
              <script>
                  var l = window.location;
                  var path = l.pathname;
                  if (path.startsWith('/blazor/')) {
                      // Blazor SPA fallback – re-encode path under /blazor/
                      l.replace(
                          l.protocol + '//' + l.host +
                          '/blazor/?p=' + encodeURIComponent(path.slice('/blazor/'.length) + l.search) +
                          l.hash
                      );
                  } else {
                      // React uses HashRouter – redirect to root
                      l.replace(l.protocol + '//' + l.host + '/');
                  }
              </script>
          </head>
          <body>
              <p>Omdirigerar…</p>
          </body>
          </html>
          EOF

      - name: Add .nojekyll
        run: touch deploy/.nojekyll

      - name: Write version file for deploy verification
        run: echo "${{ github.sha }}" > deploy/version.txt

      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: deploy
          # Preserve pr-preview/ subdirectory so previews survive main deploys
          clean-exclude: pr-preview
          single-commit: true
