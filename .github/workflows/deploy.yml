name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Publish Blazor WASM
        run: dotnet publish LagerApp/LagerApp.csproj -c Release -o publish

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install React app dependencies
        working-directory: web
        run: npm ci

      - name: Build React app
        working-directory: web
        run: npm run build

      - name: Copy React app to /web/ subdirectory
        run: cp -r web/dist publish/wwwroot/web

      - name: Add .nojekyll
        run: touch publish/wwwroot/.nojekyll

      - name: Write version file for deploy verification
        run: echo "${{ github.sha }}" > publish/wwwroot/version.txt

      - uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

      - uses: actions/deploy-pages@v4
        id: deployment
