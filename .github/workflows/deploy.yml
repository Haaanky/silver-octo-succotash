name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  administration: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Publish Blazor WASM
        run: dotnet publish LagerApp/LagerApp.csproj -c Release -o publish

      - name: Add .nojekyll
        run: touch publish/wwwroot/.nojekyll

      - name: Configure GitHub Pages source to gh-pages branch
        run: |
          gh api --method PUT /repos/${{ github.repository }}/pages \
            -f "source[branch]=gh-pages" -f "source[path]=/" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: publish/wwwroot
          clean: true
          clean-exclude: pr-preview
